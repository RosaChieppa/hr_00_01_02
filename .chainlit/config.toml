# List of environment variables to be provided by each user to use the app.
user_env = []

# Duration (in seconds) during which the session is saved when the connection is lost
session_timeout = 3600

# Duration (in seconds) of the user session expiry
user_session_timeout = 1296000  # 15 days

# Enable third parties caching (e.g., LangChain cache)
cache = false

# Whether to persist user environment variables (API keys) to the database
persist_user_env = false

# Whether to mask user environment variables (API keys) in the UI with password type
mask_user_env = false

# Authorized origins
allow_origins = ["*"]

[features]
# Process and display HTML in messages. This can be a security risk
unsafe_allow_html = false

# Process and display mathematical expressions. This can clash with "$" characters in messages.
latex = false

# Enable rendering of user messages markdown
user_message_markdown = true

# Autoscroll new user messages at the top of the window
user_message_autoscroll = true

# Autoscroll new assistant messages
assistant_message_autoscroll = true

# Automatically tag threads with the current chat profile (if a chat profile is used)
auto_tag_thread = true

# Allow users to edit their own messages
edit_message = true

# Allow users to share threads (backend + UI). Requires an app-defined on_shared_thread_view callback.
allow_thread_sharing = false

# Enable favorite messages
favorites = false

[features.slack]
reaction_on_message_received = false

# Configurazione del Drag & Drop esplicita: Rimosso '*/*' che mandava in blocco i tipi MIME del browser
[features.spontaneous_file_upload]
    enabled = true
    accept = ["text/plain", "application/pdf", "application/msword", "application/vnd.openxmlformats-officedocument.wordprocessingml.document"]
    max_files = 20
    max_size_mb = 500

[features.audio]
    enabled = false
    sample_rate = 24000

[features.mcp]
    enabled = false

[features.mcp.sse]
    enabled = true

[features.mcp.streamable-http]
    enabled = true

[features.mcp.stdio]
    enabled = true
    allowed_executables = [ "npx", "uvx" ]

[UI]
# Nome personalizzato dell'assistente visibile sulla barra superiore
name = "HR Assistant Aulab"

# Impostiamo il tema scuro di default per l'interfaccia utente
default_theme = "dark"

# Richiede una conferma prima di cancellare la chat corrente
confirm_new_chat = true

# Modalità di visualizzazione dei passaggi intermedi del modello (Chain of Thought)
cot = "full"

# Stile dei box di avviso e delle notifiche di sistema
alert_style = "classic"

# --- ATTIVAZIONE STILE CSS PERSONALIZZATO ---
custom_css = "app.css"

# --- CONFIGURAZIONE GRAFICA ASSET STATICI (Sintassi nativa senza slash iniziale) ---
favicon = "favicon.png"
logo_dark = "logo_dark.png"
logo_light = "logo_light.png"

[meta]
generated_by = "2.11.1"
